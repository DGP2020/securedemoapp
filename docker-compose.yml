#version: '3.8'

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./logs/nginx:/var/log/nginx # Export Nginx logs
      - ./nginx/nginx.crt:/etc/nginx/conf.d/nginx.crt
      - ./nginx/nginx.key:/etc/nginx/conf.d/nginx.key
      - ./nginx/blocked_ips.conf:/etc/nginx/blocked_ips.conf
    depends_on:
      - backend
    networks:
      - frontend

  monitor:
    build: 
      context: ./monitor
      dockerfile: Dockerfile
    volumes:
      - ./logs:/logs
      - ./nginx/blocked_ips.conf:/logs/blocked_ips.conf
    depends_on:
      - nginx
      - backend 

  backend:
    build: ./backend
    environment:
      # Inject the secret from the .env file into the container
      - SECRET_KEY=${JWT_SECRET}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASSWORD}
      - LOG_FILE=/app/logs/app.log
    networks:
      - frontend
      - backend
    volumes:
      - ./logs/backend:/app/logs # Export backend logs
    

  db:
    image: postgres:13
    environment:
      # Postgres uses these specific variable names to set up the DB
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    networks:
      - backend

networks:
  frontend:
  backend:

